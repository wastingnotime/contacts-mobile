name: ci-contacts-mobile-bff

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci-contacts-mobile-bff.yml
      - server/**
  workflow_dispatch:

concurrency:
  group: ci-contacts-mobile-bff
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
  IMAGE_NAME: contacts-mobile-bff
  TARGET_REPOSITORY: wastingnotime/integration-sandbox
  EVENT_TYPE: candidate-image-updated

jobs:
  server-tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run Go tests
        working-directory: server
        run: go test ./...

  publish-and-dispatch:
    runs-on: ubuntu-latest
    needs: server-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Publish BFF image
        id: publish
        uses: ./actions/publish-candidate-image
        with:
          aws_default_region: ${{ env.AWS_DEFAULT_REGION }}
          aws_role_to_assume: arn:aws:iam::590183855481:role/github-actions-ecr
          ecr_role_name: ${{ vars.ECR_ROLE_NAME }}
          ecr_repository: ${{ env.IMAGE_NAME }}
          service_name: contacts-mobile-bff
          build_context: ./server
          dockerfile: ./server/Dockerfile
          publish_latest: "true"

      - name: Dispatch integration-sandbox repository event
        env:
          GH_TOKEN: ${{ secrets.GH_INTEGRATION_SANDBOX_DISPATCH_TOKEN }}
          CANDIDATE_IMAGE_URI: ${{ steps.publish.outputs.image_reference }}
        run: |
          candidate_image="${CANDIDATE_IMAGE_URI%:*}"

          gh api "repos/${TARGET_REPOSITORY}/dispatches" \
            -X POST \
            --input - <<EOF
          {
            "event_type": "${EVENT_TYPE}",
            "client_payload": {
              "service": "contacts-mobile-bff",
              "image": "${candidate_image}",
              "sha": "${GITHUB_SHA}"
            }
          }
          EOF
