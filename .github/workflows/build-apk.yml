name: Build APK

on:
  push:
    paths:
      - ".github/workflows/build-apk.yml"
      - "app/**"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradle/libs.versions.toml"
      - "gradle/wrapper/**"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
  pull_request:
    paths:
      - ".github/workflows/build-apk.yml"
      - "app/**"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradle/libs.versions.toml"
      - "gradle/wrapper/**"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CONTACTS_BFF_ENVIRONMENT: production
  CONTACTS_BFF_PRODUCTION_BASE_URL: ${{ vars.CONTACTS_BFF_PRODUCTION_BASE_URL }}

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Validate production APK inputs
        run: |
          : "${CONTACTS_BFF_PRODUCTION_BASE_URL:?Repository variable CONTACTS_BFF_PRODUCTION_BASE_URL is required}"

      - name: Run unit tests
        run: |
          ./gradlew --no-daemon \
            -PcontactsBffEnvironment="${CONTACTS_BFF_ENVIRONMENT}" \
            -PcontactsBffProductionBaseUrl="${CONTACTS_BFF_PRODUCTION_BASE_URL}" \
            testDebugUnitTest assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: contacts-mobile-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
